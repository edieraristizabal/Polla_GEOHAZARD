name: Update World Cup Scores

on:
  schedule:
    # Run every 15 minutes to keep it highly real-time during matches
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Fetch and Update Scores
        run: npx tsx scripts/update-scores.ts

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add public/data/matches.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update tournament scores from official API" && git push)
